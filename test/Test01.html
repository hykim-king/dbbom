<!DOCTYPE html>
<html lang="ko-KR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내면의 흔적_일기 웹사이트</title>
</head>

<style>
    .top-box {
        display: flex;
        /* 가로 정렬 */
        justify-content: space-between;
        /* 양쪽 끝으로 배치 */
        align-items: center;
        /* 세로 중앙정렬(선택) */
        padding: 20px;
        /* 보기 좋게 여백 */
    }

    .left {
        font-size: 25px;
        padding: 15px 25px;
        color: rgb(247, 192, 74);
        font-weight: bold;
        font-family: fantasy;
    }

    .right {
        background-color: #ffda62;
        padding: 15px 25px;
        border-radius: 8px;
        color: rgb(255, 255, 255);
        font-weight: bold;
        
    }

    .right:hover {
        background-color: #ffe796;
        cursor: pointer;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
</style>

<body>

    <div class="top-box">
        <div class="left">내면의 흔적</div>
        <div class="right">
            <a href="https://docs.google.com/presentation/d/1M5Bq3yRMNIhfJtvz1nbGql-qQb-O280VbqBdy5Cz8n0/edit?slide=id.g3a99a1e5bf7_0_81#slide=id.g3a99a1e5bf7_0_81"
                class="right">
                로그인
            </a>
        </div>
    </div>
    <hr style="border: 2px solid #ffda62;">
    <br>
    <br>
    <br>

    <style>
        .text-box {
            text-align: center;
            /* 텍스트 가운데 정렬 */
        }
    </style>

    <style>
        .content-wrapper {
            max-width: 700px;
            /* 내용 폭 제한 (너무 넓지 않게) */
            margin: 40px auto;
            /* 가운데 배치 */
            padding: 30px 40px;
            /* 박스 안 여백 */
            background-color: #fff4c4;
            /* 박스 배경색(예시) */
            border-radius: 15px;
            /* 박스 둥글게 */
            text-align: center;
            /* 텍스트 가운데정렬 */
            line-height: 1.6;
            /* 줄 간격 */
            font-size: 18px;
            /* 보기 좋은 텍스트 크기 */
        }
    </style>

    <div class="content-wrapper">
        <p>
            오늘의 위로를 내일의 너에게
            “내 걸음의 방향은 언제나 내가 선택할 수 있다.”
            <br><br>
            ”내일의 내가 걱정되시나요?
            <br><br>
            하지만 언제 그랬냐는듯 당신은 누구보다 멋지게 해낼 사람 입니다.
            <br><br>
            당신의 이야기를 기록해보세요 ”
        </p>
    </div>

    <div class="content-wrapper">
        <p>
            저희 “내면의 흔적”은 괴롭고,지치고,힘들거나, 또는 행복하고 감사한 일이 있을 때,
            <br><br>
            부담없이 찾아와 일기를 작성하며 마음의 안정을 얻을 수 있는 장소 입니다
            <br><br>
            내 감정의 맞는 일기를 작성 해보시고 자유롭게 공유 해보세요.
        </p>
    </div>


    <style>
        .btn-area {
            text-align: center;
            /* 버튼을 가운데로 정렬 */
            margin-top: 40px;

        }

        .go-write {
            display: inline-block;
            padding: 15px 40px;
            background-color: #ffe28a;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            font-size: 18px;

        }

        .menu-item:hover {}
    </style>
    <div class="btn-area">
        <a href="https://docs.google.com/presentation/d/1M5Bq3yRMNIhfJtvz1nbGql-qQb-O280VbqBdy5Cz8n0/edit?slide=id.g3a6b89d9b3c_0_5#slide=id.g3a6b89d9b3c_0_5"
            class="go-write">일기 쓰러 가기</a>
    </div>


</body>

</html>
