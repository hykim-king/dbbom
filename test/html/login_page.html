<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 | 내면의 흔적</title>
    <link rel="stylesheet" href="../css/login_page.css" />
  </head>
  <body>
    <div class="login_container">
      <div class="info_left">
        <div class="brand_info">
          <h1>내면의 흔적</h1>
          <p>바쁜 세상 속에서<br />오직 당신만의 흔적을 남기는 공간</p>
          <div class="back_to_home">
            <a href="main.html">← 메인화면으로 돌아가기</a>
          </div>
        </div>
      </div>

      <div class="login_right">
        <div class=".login-btn">
          <h2>로그인</h2>
          <form id="fullLoginForm">
            <div class="input_field">
              <label>아이디</label>
              <input type="text" placeholder="아이디를 입력하세요" required />
            </div>
            <div class="input_field">
              <label>비밀번호</label>
              <input
                type="password"
                placeholder="비밀번호를 입력하세요"
                required
              />
            </div>
            <button type="submit" class="submit_btn">로그인</button>
          </form>

          <div class="divider"><span>또는 소셜 계정으로 로그인</span></div>

          <div class="social_btns">
            <button type="button" class="s_btn kakao">
              <span class="icon kakao-icon"></span>
              카카오 로그인
            </button>

            <button type="button" class="s_btn naver">
              <span class="icon naver-icon">N</span>
              네이버 로그인
            </button>

            <button type="button" class="s_btn google">
              <span class="icon google-icon">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 48 48"
                  width="20px"
                  height="20px"
                >
                  <path
                    fill="#EA4335"
                    d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"
                  />
                  <path
                    fill="#4285F4"
                    d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"
                  />
                  <path
                    fill="#FBBC05"
                    d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"
                  />
                  <path
                    fill="#34A853"
                    d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"
                  />
                </svg>
              </span>
              구글로 계속하기
            </button>
          </div>

          <div class="login_footer">
            <span>아이디를 잊으셨나요? <a href="../html/login_id_find.html">찾기</a></span>
            <span class="dot">·</span>
            <span>비밀번호를 잊으셨나요? <a href="../html/login_password_find.html">찾기</a></span>
            <span class="dot">·</span>
            <span>처음이신가요? <a href="../html/signin.html">회원가입</a></span>
          </div>
        </div>
      </div>
    </div>

    <script src="../javascript/login_page.js"></script>
  </body>
</html>
