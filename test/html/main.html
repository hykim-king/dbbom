  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>내면의 흔적</title>
    <link rel="stylesheet" href="../css/main.css" />
    <!-- <script type="module" src="../javascript/main.js"></script> -->
  </head>

  <body>
    <!-- 전체 박스 -->
    <div class="all">
      <!-- 메인 첫 번째 줄 박스 -->
      <div class="maintop">
        <button class="mainleft">내면의 흔적</button>

        <div class="mainright">
          <span class="signin"><a>회원가입</a></span>
          <span class="login"
            ><a href="../html/login_page.html">로그인</a></span
          >
          <!-- <span class="login"><a>로그인</a></span> -->
          <span class="mypage"><a>마이페이지</a></span>
        </div>
      </div>
    </div>

    <!-- 메인 두 번째 줄 박스 -->
    <div class="mainbottom">
      <span>📅 캘린더</span>
      <span class="divider">|</span>
      <span>🔔 공지사항</span>
      <span class="divider">|</span>
      <span>💬 게시판</span>
      <span class="divider">|</span>
      <span>📁 나의 내면</span>
    </div>

    <!-- 일기 작성 박스 -->
    <div class="diarybox">
      <div class="dbox purple">
        <div class="icon">📖</div>
        <h3>명언</h3>
        <p>얼굴을 주는 명언과 함께</p>
      </div>

      <div class="dbox blue">
        <div class="icon">💙</div>
        <h3>감사</h3>
        <p>감사한 순간을 담아보세요</p>
      </div>

      <div class="dbox green">
        <div class="icon">🧩</div>
        <h3>
          <a href="/html/luckydiary.html" class="tooltip">
            행운
            <span class="tooltip-text">시작!</span>
          </a>
        </h3>

        <p>오늘의 행운을 기록하세요</p>
      </div>

      <div class="dbox yellow">
        <div class="icon">☀️</div>
        <h3>성찰</h3>
        <p>나를 돌아보는 시간</p>
      </div>
    </div>

    <!-- 인기 게시글 박스 -->
    <h2 class="board">인기 게시글</h2>

    <div class="board-grid">
      <div class="board-box purple-light">
        <h3>인기 일기장1</h3>
        <p><strong>타입:</strong> 명언</p>
        <p><strong>감정:</strong> 평온</p>
        <span class="date">2024.11.20</span>
      </div>

      <div class="board-box blue-light">
        <h3>인기 일기장2</h3>
        <p><strong>타입:</strong> 감사</p>
        <p><strong>감정:</strong> 행복</p>
        <span class="date">2024.11.19</span>
      </div>

      <div class="board-box green-light">
        <h3>인기 일기장3</h3>
        <p><strong>타입:</strong> 행운</p>
        <p><strong>감정:</strong> 설렘</p>
        <span class="date">2024.11.18</span>
      </div>
    </div>

    <!-- 마지막 박스 -->
    <div class="lastBox">
      <button class="last-btn">더 많은 일기 보기</button>
    </div>
