<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>비밀번호 찾기 | 내면의 흔적</title>
  <link rel="stylesheet" href="../css/login_password_find.css" />
</head>
<body>

  <div class="container">
    <div class="box">
      <h1>비밀번호 찾기</h1>

      <p class="desc">
        가입하신 이메일 주소를 입력하시면  
        비밀번호 재설정 안내를 보내드립니다.
      </p>

      <form>

         <!-- 닉네임 -->
        <div class="input_group">
          <label for="nickname">닉네임</label>
          <input
            type="text"
            id="nickname"
            placeholder="가입 시 사용한 닉네임"
            required
          />
        </div>
        
        <!-- 이메일 -->
        <div class="input_group">
          <label for="email">이메일</label>
          <input
            type="email"
            id="email"
            placeholder="example@email.com"
            required
          />
        </div>

       

        <button type="submit" class="submit_btn">
          비밀번호 찾기
        </button>
      </form>

      <div class="back">
        <a href="../html/login_page.html">로그인 화면으로 돌아가기</a>
      </div>
    </div>
  </div>

</body>
</html>
