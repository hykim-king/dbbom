<!DOCTYPE html>

<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/start.css">
    <title>내면의 흔적 | 오늘의 위로를 내일의 너에게</title>
</head>

<body>
    <!-- 배경 오버레이 -->  
    <div class="background-overlay"></div>
<!-- 헤더 -->
<header>
    <div class="header-container">
        <div class="logo">내면의 흔적</div>
        <button class="login-btn" onclick="handleLogin()">로그인</button>
    </div>
</header>

<!-- 메인 -->
<main>
    <div class="content-container">

        <div class="message-box">
            <p class="highlight">오늘의 위로를 내일의 너에게</p>
            <p>"내 걸음의 방향은 언제나 내가 선택할 수 있다."</p>
            <p>내일의 내가 걱정되시나요?</p>
            <p>하지만 당신은 언제나 해내왔고, 앞으로도 해낼 사람입니다.</p>
            <p class="highlight">당신의 이야기를 기록해보세요</p>
        </div>

        <div class="message-box">
            <p><span class="highlight">"내면의 흔적"</span>은 지치고 힘든 날에도,</p>
            <p>또는 작고 소중한 행복을 느낀 날에도</p>
            <p>부담 없이 찾아와 마음을 내려놓을 수 있는 공간입니다.</p>
            <p class="highlight">내 감정의 결을 따라 일기를 쓰고, 자유롭게 남겨보세요.</p>
        </div>

        <button class="cta-button" onclick="handleStartDiary()"><a href="../html/main.html">일기 쓰러 가기</a></button>
    </div>
</main>

<!-- 푸터 -->
<footer>
    © 2024 오늘의 위로를 내일의 너에게. All rights reserved.
</footer>

<script>
    function handleLogin() {
        alert('로그인 페이지로 이동합니다.');
    }

    function handleStartDiary() {
        alert('일기 작성 페이지로 이동합니다.');
    }
</script>


</body>
</html>
