<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>아이디찾기 | 내면의 흔적</title>
  <link rel="stylesheet" href="../css/login_password_find.css" />
</head>
<body>

  <div class="container">
    <div class="box">
      <h1>아이디 찾기</h1>

      <p class="desc">
        회원가입 시 사용한 이메일과 닉네임을 입력하시면  
        아이디를 확인할 수 있는 안내를 보내드립니다.
      </p>

      <form>
        <div class="input_group">
          <label for="email">이메일</label>
          <input
            type="email"
            id="email"
            placeholder="example@email.com"
            required
          />
        </div>

        <button type="submit" class="submit_btn">
          이메일로 안내 받기
        </button>
      </form>

      <div class="back">
        <a href="../html/login_page.html">로그인 화면으로 돌아가기</a>
      </div>
    </div>
  </div>

</body>
</html>
