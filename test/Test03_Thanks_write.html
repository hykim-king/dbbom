<!DOCTYPE html>
<html lang="ko-KR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내면의 흔적_일기 웹사이트</title>
</head>


<style>
    /* 메뉴바 디자인*/

    .top-box {
        display: flex;
        /* 가로 정렬 */
        justify-content: space-between;
        /* 양쪽 끝으로 배치 */
        align-items: center;
        /* 세로 중앙정렬(선택) */
        padding: 20px;
        /* 보기 좋게 여백 */
    }

    .left {
        font-size: 25px;
        padding: 15px 25px;
        color: rgb(247, 192, 74);
        font-weight: bold;
        font-family: fantasy;
    }

    .right {
        background-color: #ffda62;
        padding: 15px 25px;
        border-radius: 8px;
        color: rgb(255, 255, 255);
        font-weight: bold;
    }

    .right:hover {
        background-color: #ffe796;
        cursor: pointer;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
</style>

<body>

    <div class="top-box">
        <div class="left">내면의 흔적</div>
        <div class="right">
            <a href="https://docs.google.com/presentation/d/1M5Bq3yRMNIhfJtvz1nbGql-qQb-O280VbqBdy5Cz8n0/edit?slide=id.g3a99a1e5bf7_0_81#slide=id.g3a99a1e5bf7_0_81"
                class="right">
                로그인
            </a>
        </div>
    </div>

    <style>
        .menu-bar {
            background-color: #ffd862;
            padding: 15px 20px;
            border-radius: 15px;
            margin: 1px 10px 20px 20px;
            /* 메뉴바를 위로 올림 */
            display: flex;
            justify-content: space-around;
            /* 메뉴 간격 자동 정렬 */
            align-items: center;
        }

        .menu-item {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 10px;
        }

        .menu-item:hover {
            background-color: #ffe796;
            

        }

        .menu-text {
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
        }
    </style>

    <div class="menu-bar">
        <div class="menu-text">메뉴</div>

        <a href="https://docs.google.com/presentation/d/1M5Bq3yRMNIhfJtvz1nbGql-qQb-O280VbqBdy5Cz8n0/edit?slide=id.g3a6b89d9b3c_0_20#slide=id.g3a6b89d9b3c_0_20"
            class="menu-item">개요</a>
        <a href="https://docs.google.com/presentation/d/1M5Bq3yRMNIhfJtvz1nbGql-qQb-O280VbqBdy5Cz8n0/edit?slide=id.g3a6b89d9b3c_8_18#slide=id.g3a6b89d9b3c_8_18"
            class="menu-item">공지사항</a>
        <a href="https://docs.google.com/presentation/d/1M5Bq3yRMNIhfJtvz1nbGql-qQb-O280VbqBdy5Cz8n0/edit?slide=id.g3a6b89d9b3c_8_22#slide=id.g3a6b89d9b3c_8_22"
            class="menu-item">게시판</a>
    </div>

<style>
    .write-box {
        width: 90%;
        margin: 30px auto;
        background-color: #ffe591;
        border-radius: 12px;
        padding: 25px;
    }

    .row {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
    }

    .field {
        flex: 1;
    }

    .field label {
        font-weight: bold;
        display: block;
        margin-bottom: 6px;
        font-size: 16px;
    }

    input[type="text"],
    input[type="date"],
    textarea {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #aaa;
        font-size: 15px;
        box-sizing: border-box;
    }

    textarea {
        height: 250px;
    }

    .toggle-area {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 28px;
    }

    .toggle-area span {
        font-size: 16px;
        font-weight: bold;
    }

    .submit-btn {
        width: 120px;
        border: none;
        padding: 15px;
        background-color: #ffd95b;
        color: white;
        font-size: 17px;
        border-radius: 10px;
        cursor: pointer;
        display: block;
        margin: 30px auto 0 auto;
    }

    .submit-btn:hover {
        background-color: #fff4c4;
    }
</style>

<div class="write-box">

    <div class="row">
        <div class="field">
            <label>제목</label>
            <input type="text" placeholder="제목을 입력하세요">
        </div>

        <div class="field" style="max-width: 200px;">
            <label>날짜</label>
            <input type="text" id="today" readonly>
        </div>

        
        <div class="toggle-area" style="max-width: 200px;">
        <label>
            <input type="radio" name="visibility" value="public" checked>
            공개
        </label>

        <label style="margin-left:10px;">
            <input type="radio" name="visibility" value="private">
            비공개
        </label>
    </div>
    </div>

    <label style="font-weight:bold; font-size:16px;">일기 내용</label>
    <textarea placeholder="일기 내용을 입력하세요. (주석으로 글 작성 시 주의사항 입력)"></textarea>

    <button class="submit-btn">등록</button>
</div>

<script>
    // 오늘 날짜 자동 입력
    const today = new Date();
    document.getElementById("today").value =
        today.getFullYear() + "-" +
        String(today.getMonth() + 1).padStart(2, '0') + "-" +
        String(today.getDate()).padStart(2, '0');


</script>
